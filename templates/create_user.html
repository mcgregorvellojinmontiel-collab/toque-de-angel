<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear Usuario</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static', filename='css/icono.png') }}"
    >

</head>
<body>

    <div class="login-container">

        <form method="POST" class="login-form">

            <h1>Crear usuario</h1>

            <p class="login-subtitle">
                Registra un nuevo usuario administrador para el sistema.
            </p>

            {% if error %}
                <div class="error-message">
                    {{ error }}
                </div>
            {% endif %}

            <label>
                Nombre de usuario
            </label>

            <input
                type="text"
                name="username"
                placeholder="Ejemplo: admin2"
                minlength="3"
                maxlength="30"
                required
            >

            <label>
                Contraseña
            </label>

            <input
                type="password"
                name="password"
                placeholder="Mínimo 6 caracteres"
                minlength="6"
                maxlength="30"
                required
            >

            <button type="submit">
                Crear usuario
            </button>

            <a
                href="{{ url_for('users') }}"
                class="back-btn"
            >
                Volver a usuarios
            </a>

        </form>

    </div>

</body>
</html>
